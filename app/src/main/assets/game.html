<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Lucky Spin • Win Amazing Prizes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js">
  </script>
  <style>
    * {
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    outline: none;
}

button, .center, .prize-item, .quick-bet, .sound-toggle {
    -webkit-tap-highlight-color: transparent;
    -webkit-appearance: none;
    outline: none;
}
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at 20% 20%, #1e293b, #0b0f17);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      margin: 0;
      position: relative;
      overflow-x: hidden;
    }

    #fireworksCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
    }

    .container {
      width: 100%;
      max-width: 540px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .card {
      background: rgba(18, 22, 30, 0.9);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 40px;
      padding: 1.8rem 1.5rem 2rem;
      box-shadow: 0 35px 70px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .header {
      text-align: center;
      margin-bottom: 1.2rem;
    }

    .header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -1.5px;
      background: linear-gradient(180deg, #ffffff 0%, #cbd5e1 90%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.2rem;
    }

    .header p {
      color: #94a3b8;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .prize-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }

    .prize-item {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 0.7rem 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      backdrop-filter: blur(8px);
      transition: all 0.3s;
      cursor: default;
    }

    .prize-item:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }

    .prize-item i {
      font-size: 1.2rem;
      width: 24px;
      text-align: center;
      color: #cbd5e1;
    }

    .prize-item span {
      font-size: 0.8rem;
      font-weight: 600;
      color: #e2e8f0;
      letter-spacing: -0.2px;
    }

    .prize-item.winner {
      animation: winnerGlow 0.6s ease-in-out 3;
      border-color: #fbbf24;
      background: rgba(251, 191, 36, 0.2);
    }

    @keyframes winnerGlow {
      0%,
      100% {
        box-shadow: 0 0 5px rgba(251, 191, 36, 0.3);
      }
      50% {
        box-shadow: 0 0 25px rgba(251, 191, 36, 0.8);
      }
    }

    .wheel-area {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0.5rem 0 1.5rem;
      filter: drop-shadow(0 20px 25px rgba(0, 0, 0, 0.6));
    }

    .pointer {
      position: absolute;
      top: -16px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 34px solid #fbbf24;
      filter: drop-shadow(0 8px 8px rgba(0, 0, 0, 0.7));
      z-index: 20;
      transition: border-top-color 0.2s;
    }

    .wheel {
      width: 270px;
      height: 270px;
      border-radius: 50%;
      position: relative;
      background: conic-gradient(#fbbf24 0deg 30deg, #f97316 30deg 60deg, #06b6d4 60deg 90deg, #8b5cf6 90deg 120deg, #ec4899 120deg 150deg, #10b981 150deg 180deg, #fbbf24 180deg 210deg, #f97316 210deg 240deg, #06b6d4 240deg 270deg, #8b5cf6 270deg 300deg, #ec4899 300deg 330deg, #10b981 330deg 360deg);
      border: 9px solid #1e293b;
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5), 0 20px 40px rgba(0, 0, 0, 0.7);
      transition: transform 0.4s cubic-bezier(0.25, 0.1, 0.15, 1.2);
      will-change: transform;
    }

    .center {
      position: absolute;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #f8fafc, #cbd5e1);
      border: 6px solid #0f172a;
      box-shadow: inset 0 -4px 6px rgba(0, 0, 0, 0.3), 0 10px 20px rgba(0, 0, 0, 0.6);
      z-index: 15;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.1rem;
      color: #0f172a;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .center:active {
      transform: scale(0.9);
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 1.2rem;
    }

    .box {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      padding: 0.7rem 0.4rem;
      border: 1px solid rgba(255, 255, 255, 0.07);
      text-align: center;
      transition: all 0.3s;
    }

    .box span {
      color: #9ca3af;
      font-size: 0.65rem;
      font-weight: 500;
      text-transform: uppercase;
    }

    .box h3 {
      margin-top: 3px;
      font-size: 1rem;
      font-weight: 700;
      color: #f1f5f9;
      transition: all 0.3s;
    }

    .box.balance-increase h3 {
      animation: balancePop 0.5s ease-out;
    }

    @keyframes balancePop {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.3);
        color: #4ade80;
      }
      100% {
        transform: scale(1);
      }
    }

    .free-spins-box {
      background: rgba(251, 191, 36, 0.12);
      border-color: rgba(251, 191, 36, 0.25);
    }

    .bet {
      margin-bottom: 1.2rem;
    }

    .bet label {
      display: block;
      margin-bottom: 0.4rem;
      color: #cbd5e1;
      font-size: 0.85rem;
    }

    .bet-input-wrapper {
      position: relative;
    }

    .bet input {
      width: 100%;
      padding: 0.8rem 3rem 0.8rem 1rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(12px);
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: all 0.2s;
      cursor: not-allowed;
      opacity: 0.7;
    }

    .bet input:focus {
      border-color: #fbbf24;
      box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.2);
    }

    .bet-currency {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      font-size: 0.85rem;
      font-weight: 600;
      pointer-events: none;
    }

    button {
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: 20px;
      background: linear-gradient(135deg, #fde047, #f59e0b);
      color: #0f172a;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 12px 25px rgba(251, 191, 36, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      position: relative;
      overflow: hidden;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 18px 35px rgba(251, 191, 36, 0.5);
    }

    button:active:not(:disabled) {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      filter: grayscale(0.2);
    }

    button::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transform: rotate(45deg);
      transition: 0.5s;
      opacity: 0;
    }

    button:hover:not(:disabled)::after {
      opacity: 1;
      left: 100%;
    }

    .result-message {
      text-align: center;
      margin-top: 0.7rem;
      font-weight: 600;
      color: #facc15;
      min-height: 22px;
      font-size: 0.9rem;
      transition: all 0.3s;
    }

    .result-message.win {
      animation: messageBounce 0.5s ease-out;
    }

    @keyframes messageBounce {
      0% {
        transform: scale(0.8);
        opacity: 0;
      }
      50% {
        transform: scale(1.1);
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .footer {
      text-align: center;
      color: #7c8798;
      margin-top: 0.8rem;
      font-size: 0.75rem;
    }

    .sound-toggle {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #9ca3af;
      transition: all 0.2s;
      z-index: 2;
    }

    .sound-toggle:hover {
      color: #fbbf24;
      border-color: #fbbf24;
    }

    @media (max-width: 400px) {
      .card {
        padding: 1.5rem 1rem;
      }
      .wheel {
        width: 230px;
        height: 230px;
      }
      .prize-item span {
        font-size: 0.7rem;
      }
    }
  </style>
</head>
<body>

  <canvas id="fireworksCanvas"></canvas>

  <div class="container">
    <div class="card">
      <div class="sound-toggle" id="soundToggle" title="Sound effects">
        <i class="fas fa-volume-up"></i>
      </div>

      <div class="header">
        <h1>Lucky Wheel</h1>
        <p>12 amazing prizes up for grabs</p>
      </div>

      <div class="prize-grid" id="prizeGrid"></div>

      <div class="wheel-area">
        <div class="pointer" id="pointer"></div>
        <div class="wheel" id="wheel"></div>
        <div class="center" id="centerDisplay" title="Click to spin">🎰</div>
      </div>

      <div class="stats">
        <div class="box" id="balanceBox">
          <span>Balance</span>
          <h3 id="balanceDisplay">0 ETB</h3>
        </div>
        <div class="box">
          <span>Cost/Spin</span>
          <h3 id="costDisplay">10 ETB</h3>
        </div>
        <div class="box free-spins-box">
          <span>Free Spins</span>
          <h3 id="freeSpinsDisplay">5</h3>
        </div>
      </div>

      <div class="bet">
        <label>Bet Amount (fixed 10 ETB per spin)</label>
        <div class="bet-input-wrapper">
          <input type="number" id="betAmount" value="10" disabled readonly>
          <span class="bet-currency">ETB</span>
        </div>
      </div>

      <button id="spinButton">
        <span>⚡</span> SPIN NOW <span>⚡</span>
      </button>

      <div class="result-message" id="resultMessage"></div>
      <div class="footer">🍀 5 free spins included • Good luck!</div>
    </div>
  </div>

  <script>
    (function() {
      const SLOTS = [
        { slot: 1, item: "250 Birr", tier: "Winnable Cash", probability: 50.0, icon: "fa-gift" },
        { slot: 2, item: "Free Ride Ticket", tier: "Cosmetic Bait", probability: 0.0, icon: "fa-ticket" },
        { slot: 3, item: "500 Birr", tier: "Winnable Cash", probability: 30.0, icon: "fa-gift" },
        { slot: 4, item: "Smart TV", tier: "Cosmetic Bait", probability: 0.0, icon: "fa-tv" },
        { slot: 5, item: "1,000 Birr", tier: "Winnable Cash", probability: 14.5, icon: "fa-gift" },
        { slot: 6, item: "Galaxy A55", tier: "Cosmetic Bait", probability: 0.0, icon: "fa-mobile-alt" },
        { slot: 7, item: "2,500 Birr", tier: "Winnable Cash", probability: 5.0, icon: "fa-gift" },
        { slot: 8, item: "Dubai Trip", tier: "Cosmetic Bait", probability: 0.0, icon: "fa-plane" },
        { slot: 9, item: "5,000 Birr", tier: "Winnable Cash", probability: 0.5, icon: "fa-gift" },
        { slot: 10, item: "Refrigerator", tier: "Cosmetic Bait", probability: 0.0, icon: "fa-temperature-low" },
        { slot: 11, item: "Earbuds", tier: "Cosmetic Bait", probability: 0.0, icon: "fa-headphones" },
        { slot: 12, item: "Try Again", tier: "Cosmetic Bait", probability: 0.0, icon: "fa-rotate-right" }
      ];

      const STATE = {
        balance: 0,
        spinCost: 10,
        freeSpins: 5,
        isSpinning: false,
        currentRotation: 0,
        soundEnabled: true,
        fireworks: null,
        spinCount: 0,
        forcedTryAgain: true
      };

      const wheelEl = document.getElementById('wheel');
      const prizeGrid = document.getElementById('prizeGrid');
      const balanceDisplay = document.getElementById('balanceDisplay');
      const balanceBox = document.getElementById('balanceBox');
      const costDisplay = document.getElementById('costDisplay');
      const freeSpinsDisplay = document.getElementById('freeSpinsDisplay');
      const betInput = document.getElementById('betAmount');
      const spinButton = document.getElementById('spinButton');
      const resultMessageEl = document.getElementById('resultMessage');
      const centerDisplay = document.getElementById('centerDisplay');
      const pointerEl = document.getElementById('pointer');
      const soundToggle = document.getElementById('soundToggle');
      const fireworksCanvas = document.getElementById('fireworksCanvas');

      class FireworksEngine {
        constructor(canvas) {
          this.canvas = canvas;
          this.ctx = canvas.getContext('2d');
          this.particles = [];
          this.animationId = null;
          this.resize();
          window.addEventListener('resize', () => this.resize());
        }

        resize() {
          this.canvas.width = window.innerWidth;
          this.canvas.height = window.innerHeight;
        }

        createFirework(x, y) {
          const colors = ['#fbbf24', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#10b981', '#ec4899', '#f97316',
            '#84cc16', '#6366f1'
          ];
          const particleCount = 80;
          for (let i = 0; i < particleCount; i++) {
            const angle = (Math.PI * 2 * i) / particleCount;
            const speed = 2 + Math.random() * 6;
            this.particles.push({
              x: x,
              y: y,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed,
              life: 1,
              decay: 0.01 + Math.random() * 0.02,
              color: colors[Math.floor(Math.random() * colors.length)],
              size: 2 + Math.random() * 3,
            });
          }
          if (!this.animationId) this.animate();
        }

        launchFireworks() {
          for (let i = 0; i < 5; i++) {
            setTimeout(() => {
              const x = Math.random() * this.canvas.width;
              const y = Math.random() * this.canvas.height * 0.6;
              this.createFirework(x, y);
            }, i * 200);
          }
        }

        animate() {
          this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
          this.particles = this.particles.filter(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.05;
            p.life -= p.decay;
            if (p.life <= 0) return false;
            this.ctx.save();
            this.ctx.globalAlpha = p.life;
            this.ctx.fillStyle = p.color;
            this.ctx.beginPath();
            this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            this.ctx.fill();
            this.ctx.restore();
            return true;
          });
          if (this.particles.length > 0) {
            this.animationId = requestAnimationFrame(() => this.animate());
          } else {
            this.animationId = null;
          }
        }
      }

      const AudioEngine = {
        ctx: null,
        init() {
          try {
            this.ctx = new(window.AudioContext || window.webkitAudioContext)();
          } catch (e) {
            STATE.soundEnabled = false;
          }
        },
        playTick() {
          if (!STATE.soundEnabled || !this.ctx) return;
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.frequency.value = 800;
          gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.1);
          osc.start(this.ctx.currentTime);
          osc.stop(this.ctx.currentTime + 0.1);
        },
        playWin() {
          if (!STATE.soundEnabled || !this.ctx) return;
          const notes = [523, 659, 784, 1047];
          notes.forEach((freq, i) => {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.type = 'triangle';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.15, this.ctx.currentTime + i * 0.1);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + i * 0.1 + 0.2);
            osc.start(this.ctx.currentTime + i * 0.1);
            osc.stop(this.ctx.currentTime + i * 0.1 + 0.2);
          });
        },
        playLose() {
          if (!STATE.soundEnabled || !this.ctx) return;
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.frequency.value = 300;
          gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.3);
          osc.start(this.ctx.currentTime);
          osc.stop(this.ctx.currentTime + 0.3);
        }
      };

      function renderPrizeGrid() {
        if (!prizeGrid) return;
        prizeGrid.innerHTML = '';
        SLOTS.forEach((slot) => {
          const div = document.createElement('div');
          div.className = 'prize-item';
          div.setAttribute('data-slot', slot.slot);
          div.innerHTML = `<i class="fas ${slot.icon}"></i><span>${slot.item}</span>`;
          prizeGrid.appendChild(div);
        });
      }

      function highlightWinningPrize(slotNumber) {
        document.querySelectorAll('.prize-item').forEach(el => el.classList.remove('winner'));
        const winner = document.querySelector(`.prize-item[data-slot="${slotNumber}"]`);
        if (winner) {
          winner.classList.add('winner');
          setTimeout(() => winner.classList.remove('winner'), 2000);
        }
      }

      function formatBalance(amount) {
        return amount.toLocaleString('en-US') + ' ETB';
      }

      function refreshUI() {
        balanceDisplay.textContent = formatBalance(STATE.balance);
        costDisplay.textContent = formatBalance(STATE.spinCost);
        freeSpinsDisplay.textContent = STATE.freeSpins;

        const canSpin = STATE.freeSpins > 0 || STATE.balance >= STATE.spinCost;
        spinButton.disabled = STATE.isSpinning || !canSpin;
        betInput.disabled = true;
      }

      function animateBalanceIncrease() {
        balanceBox.classList.add('balance-increase');
        setTimeout(() => balanceBox.classList.remove('balance-increase'), 600);
      }

      function selectWinningSlot() {
        STATE.spinCount++;
        if (STATE.forcedTryAgain && STATE.spinCount === 1) {
          return SLOTS.find(s => s.slot === 12);
        }
        const cashSlots = SLOTS.filter(s => s.probability > 0);
        if (cashSlots.length === 0) return SLOTS[11];
        const totalProb = cashSlots.reduce((sum, s) => sum + s.probability, 0);
        let random = Math.random() * totalProb;
        for (let slot of cashSlots) {
          random -= slot.probability;
          if (random <= 0) return slot;
        }
        return cashSlots[cashSlots.length - 1];
      }

      function getTargetAngle(slotNumber) {
        return (360 - (((slotNumber - 1) * 30) + 15)) % 360;
      }

      let tickInterval = null;

      function startTickSound() {
        AudioEngine.playTick();
        tickInterval = setInterval(() => {
          AudioEngine.playTick();
        }, 150);
      }

      function stopTickSound() {
        if (tickInterval) {
          clearInterval(tickInterval);
          tickInterval = null;
        }
      }

      function performSpin(winningSlot) {
        return new Promise((resolve) => {
          const target = getTargetAngle(winningSlot.slot);
          const spins = 6 + Math.floor(Math.random() * 4);
          const endRotation = STATE.currentRotation + (spins * 360) + target;

          startTickSound();
          wheelEl.style.transition = 'transform 4.2s cubic-bezier(0.2, 0.02, 0.15, 1)';
          wheelEl.style.transform = `rotate(${endRotation}deg)`;
          pointerEl.style.borderTopColor = '#fde047';

          const finish = () => {
            wheelEl.removeEventListener('transitionend', finish);
            STATE.currentRotation = endRotation;
            pointerEl.style.borderTopColor = '#fbbf24';
            stopTickSound();
            resolve();
          };

          wheelEl.addEventListener('transitionend', finish);
          setTimeout(() => {
            wheelEl.removeEventListener('transitionend', finish);
            if (STATE.isSpinning) {
              stopTickSound();
              finish();
            }
          }, 4500);
        });
      }

      function celebrateWin(isCashWin) {
        confetti({
          particleCount: 150,
          spread: 80,
          origin: { y: 0.6 },
          colors: ['#fbbf24', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#10b981'],
        });

        setTimeout(() => {
          confetti({
            particleCount: 80,
            angle: 60,
            spread: 60,
            origin: { x: 0, y: 0.6 },
          });
          confetti({
            particleCount: 80,
            angle: 120,
            spread: 60,
            origin: { x: 1, y: 0.6 },
          });
        }, 200);

        setTimeout(() => {
          confetti({
            particleCount: 100,
            spread: 100,
            origin: { y: 0.4 },
            colors: ['#fbbf24', '#f59e0b', '#10b981', '#06b6d4'],
          });
        }, 400);

        if (STATE.fireworks) {
          STATE.fireworks.launchFireworks();
        }

        if (isCashWin) {
          AudioEngine.playWin();
        }
      }

      async function onSpinClick() {
        if (STATE.isSpinning) return;

        const useFreeSpin = STATE.freeSpins > 0;
        if (!useFreeSpin && STATE.balance < STATE.spinCost) {
          resultMessageEl.textContent = '❌ Insufficient balance. Add funds to continue.';
          resultMessageEl.classList.add('win');
          setTimeout(() => resultMessageEl.classList.remove('win'), 500);
          return;
        }

        if (useFreeSpin) {
          STATE.freeSpins--;
        } else {
          STATE.balance -= STATE.spinCost;
        }

        STATE.isSpinning = true;
        refreshUI();
        centerDisplay.textContent = '✨';
        resultMessageEl.textContent = '';

        const winningSlot = selectWinningSlot();

        try {
          await performSpin(winningSlot);

          let prizeAmount = 0;
          if (winningSlot.tier === 'Winnable Cash') {
            prizeAmount = parseInt(winningSlot.item.replace(/[^0-9]/g, '')) || 0;
          }

          highlightWinningPrize(winningSlot.slot);

          if (prizeAmount > 0) {
            STATE.balance += prizeAmount;
            animateBalanceIncrease();
            resultMessageEl.textContent = `🎉 Congrats! You won ${winningSlot.item}!`;
            celebrateWin(true);
          } else if (winningSlot.item === 'Try Again') {
            resultMessageEl.textContent = `😕 Try Again – Your next spin wins real prizes!`;
            AudioEngine.playLose();
          } else {
            resultMessageEl.textContent = `🎁 ${winningSlot.item} – Cosmetic prize!`;
            celebrateWin(false);
          }

          resultMessageEl.classList.add('win');
          setTimeout(() => resultMessageEl.classList.remove('win'), 600);

          centerDisplay.textContent = '🎰';
        } catch (e) {
          if (useFreeSpin) STATE.freeSpins++;
          else STATE.balance += STATE.spinCost;
          resultMessageEl.textContent = '⚠️ Error. Refunded.';
        } finally {
          STATE.isSpinning = false;
          refreshUI();
        }
      }

      spinButton.addEventListener('click', onSpinClick);

      centerDisplay.addEventListener('click', () => {
        if (!STATE.isSpinning && !spinButton.disabled) {
          onSpinClick();
        }
      });

      soundToggle.addEventListener('click', () => {
        STATE.soundEnabled = !STATE.soundEnabled;
        const icon = soundToggle.querySelector('i');
        if (STATE.soundEnabled) {
          icon.className = 'fas fa-volume-up';
          soundToggle.style.color = '#9ca3af';
          AudioEngine.init();
        } else {
          icon.className = 'fas fa-volume-mute';
          soundToggle.style.color = '#ef4444';
        }
      });

      function init() {
        renderPrizeGrid();
        betInput.value = 10;
        STATE.spinCost = 10;
        STATE.freeSpins = 5;
        STATE.balance = 0;
        STATE.spinCount = 0;
        STATE.forcedTryAgain = true;
        wheelEl.style.transform = 'rotate(0deg)';
        STATE.currentRotation = 0;
        STATE.fireworks = new FireworksEngine(fireworksCanvas);
        AudioEngine.init();
        refreshUI();
        resultMessageEl.textContent = '';
        centerDisplay.textContent = '🎰';
      }

      init();
    })();
  </script>
</body>
</html>
